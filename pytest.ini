[pytest]
testpaths = tests
# importlib import mode lets same-basename test files coexist across dirs
# (e.g. tests/test_replacement_scan.py and tests/vane_ported/test_replacement_scan.py).
addopts = --import-mode=importlib
markers =
    benchmark: marks tests as benchmarks (deselect with '-m "not benchmark"')
    slow: marks tests as slow (e.g. spin up a Ray cluster); deselect with '-m "not slow"'
