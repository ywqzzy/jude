<svg xmlns="http://www.w3.org/2000/svg" width="560" height="160" viewBox="0 0 560 160" fill="none" role="img" aria-label="jude">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- icon: a soundwave (music) that resolves into tidy data bars -->
  <rect x="20" y="20" width="120" height="120" rx="28" fill="url(#g)"/>
  <g fill="#ffffff">
    <rect x="46"  y="82" width="11" height="34" rx="5.5"/>
    <rect x="63"  y="58" width="11" height="58" rx="5.5"/>
    <rect x="80"  y="70" width="11" height="46" rx="5.5"/>
    <rect x="97"  y="44" width="11" height="72" rx="5.5"/>
    <rect x="114" y="64" width="11" height="52" rx="5.5"/>
  </g>

  <!-- wordmark -->
  <text x="170" y="98" font-family="Helvetica, Arial, sans-serif" font-size="82" font-weight="800" fill="url(#g)" letter-spacing="-2">jude</text>
  <!-- tagline -->
  <text x="172" y="128" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#94a3b8" letter-spacing="3.5">LLM DATA ENGINE</text>
</svg>
